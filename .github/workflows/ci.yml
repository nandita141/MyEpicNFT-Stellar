name: CI/CD — MyEpicNFT-Stellar

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '20'

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1: Rust Smart Contract — Test & Build
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  contract-ci:
    name: 🦀 Contract — Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: StellarCard/contracts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            StellarCard/contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run contract unit + integration tests
        run: cargo test --features testutils -- --nocapture

      - name: Build WASM release artifact
        run: cargo build --target wasm32v1-none --release

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: stellar-card-wasm
          path: StellarCard/contracts/target/wasm32v1-none/release/stellar_card_contract.wasm
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2: Frontend — Lint, Test & Build
# ─────────────────────────────────────────────────────────────────────────────
  frontend-ci:
    name: ⚛️ Frontend — Lint, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: StellarCard/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci
        working-directory: StellarCard

      - name: Run ESLint
        run: npm run lint

      - name: Run Vitest unit tests
        run: npm test --run
        env:
          VITE_CONTRACT_ID: ${{ secrets.VITE_CONTRACT_ID || 'CDQ4LCGKICDNAQKRFGPCTDVDNWUU7JIVXGWKGSPA3A5A44Q45PCB7PD4' }}
          VITE_RPC_URL: https://soroban-testnet.stellar.org:443
          VITE_NETWORK: testnet

      - name: Build production bundle
        run: npm run build
        env:
          VITE_CONTRACT_ID: ${{ secrets.VITE_CONTRACT_ID || 'CDQ4LCGKICDNAQKRFGPCTDVDNWUU7JIVXGWKGSPA3A5A44Q45PCB7PD4' }}
          VITE_RPC_URL: https://soroban-testnet.stellar.org:443
          VITE_NETWORK: testnet

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: StellarCard/frontend/dist
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3: Deploy to Vercel (only on push to main, after CI passes)
# ─────────────────────────────────────────────────────────────────────────────
  deploy-vercel:
    name: 🚀 Deploy → Vercel
    runs-on: ubuntu-latest
    needs: [contract-ci, frontend-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://my-epic-nft-stellar-frontend-48b7.vercel.app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Install dependencies
        run: npm ci
        working-directory: StellarCard

      - name: Deploy to Vercel Production
        run: |
          vercel deploy \
            --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --cwd StellarCard/frontend \
            --build-env VITE_CONTRACT_ID=${{ secrets.VITE_CONTRACT_ID }} \
            --build-env VITE_RPC_URL=https://soroban-testnet.stellar.org:443 \
            --build-env VITE_NETWORK=testnet
